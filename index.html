<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corn Wallet Silo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --bg-body: #F9F7F1;
            --bg-card: #FFFFFF;
            --bg-input: #F3F0E6;
            --text-main: #2D2A26;
            --text-muted: #7A756B;
            --accent-gold: #E5A910;
            --accent-green: #4A7C59;
            --accent-red: #D9534F;
            --border-color: #E8E4D9;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .dark-mode {
            --bg-body: #161512;
            --bg-card: #22201C;
            --bg-input: #1A1815;
            --text-main: #F4F1EB;
            --text-muted: #A39D91;
            --accent-gold: #FFC82C;
            --accent-green: #63A375;
            --accent-red: #E66A66;
            --border-color: #38352D;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s;
        }
        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-body);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 1.4em; font-weight: 700; color: var(--accent-gold); font-family: 'Outfit'; }
        
        main { flex: 1; padding: 20px 24px; width: 100%; max-width: 1200px; margin: 0 auto; }
        
        /* Dialogue Bubble */
        .speech-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.5s ease-out;
        }
        .speech-bubble {
            background: var(--accent-gold);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px 12px 12px 0;
            font-weight: 500;
            font-size: 0.95em;
            position: relative;
            box-shadow: var(--shadow);
            max-width: 80%;
        }
        .corn-avatar {
            font-size: 2.5em;
        }

        .auth-card {
            max-width: 400px; margin: 60px auto; text-align: center; padding: 40px;
            background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow);
        }
        .pin-input {
            width: 100%; max-width: 240px; padding: 16px 0; background: var(--bg-input); border: 2px solid var(--border-color);
            border-radius: 12px; color: var(--text-main); text-align: center; letter-spacing: 0.5em; font-size: 1.8em; 
            font-weight: 700; font-family: 'Outfit'; margin: 20px auto; outline: none;
        }
        .btn {
            background: var(--accent-gold); color: #fff; padding: 12px 20px; 
            border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.1); }
        
        .silo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); padding: 20px; box-shadow: var(--shadow); position: relative; }
        
        .silo-bal { font-size: 1.8em; font-family: 'Outfit'; font-weight: 700; text-align: center; margin: 5px 0; }
        .silo-bal span { font-size: 0.5em; color: var(--accent-gold); }
        .silo-usd { font-size: 1.1em; color: var(--accent-green); font-weight: 600; text-align: center; margin-bottom: 12px; }
        
        .silo-stats { display: flex; justify-content: space-around; background: var(--bg-input); padding: 10px; border-radius: 8px; margin-bottom: 12px; }
        .stat-col { display: flex; flex-direction: column; align-items: center; }
        .stat-lbl { color: var(--text-muted); font-size: 0.7em; text-transform: uppercase; font-weight: 600; }
        .stat-val { font-weight: 700; font-size: 0.85em; }
        
        .accordion { border: 1px solid var(--border-color); border-radius: 8px; margin-top: 10px; overflow: hidden; }
        .acc-header { padding: 10px; background: var(--bg-input); cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85em; font-weight: 600; }
        .acc-body { max-height: 0; overflow-y: auto; transition: max-height 0.3s; background: var(--bg-card); }
        .accordion.open .acc-body { max-height: 250px; border-top: 1px solid var(--border-color); }
        
        .list-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 0.8em; align-items: center; }
        .token-icon { width: 24px; height: 24px; border-radius: 50%; background: var(--bg-input); object-fit: cover; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .spin { animation: rotation 1s linear infinite; display: inline-block; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>
    <header>
        <div class="brand"><i class="ph-fill ph-barn"></i> CORN SILO</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="price-box" style="font-weight: 600; color: var(--accent-green); font-size: 0.9em;">Syncing...</div>
            <button class="btn" style="padding: 6px 10px; background: var(--bg-input); color: var(--text-main);" onclick="toggleTheme()"><i class="ph ph-sun"></i></button>
            <button class="btn" id="lock-btn" style="display:none; background: var(--accent-red); padding: 6px 10px;" onclick="lockApp()"><i class="ph ph-lock"></i></button>
        </div>
    </header>

    <main>
        <div id="screen-setup" class="screen">
            <div class="auth-card">
                <h2>Welcome to the Silo</h2>
                <p style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 10px;">Corn, set a 6-digit PIN to secure your grains locally.</p>
                <input type="password" id="setup-pin" class="pin-input" maxlength="6" inputmode="numeric" placeholder="000000">
                <button class="btn" style="width:100%" onclick="initVault()">Initialize Silo</button>
            </div>
        </div>

        <div id="screen-login" class="screen">
            <div class="auth-card">
                <h2>Silo is Locked</h2>
                <input type="password" id="login-pin" class="pin-input" maxlength="6" inputmode="numeric">
                <button class="btn" style="width:100%" onclick="unlockVault()">Unlock Grains</button>
                <div id="login-err" style="color:var(--accent-red); margin-top:10px; font-size: 0.9em;"></div>
            </div>
        </div>

        <div id="screen-dash" class="screen">
            <!-- Dynamic Dialogue -->
            <div class="speech-container">
                <div class="corn-avatar">🌽</div>
                <div class="speech-bubble" id="silo-speech">Checking the fields, Corn...</div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
                <h1>Grain Management</h1>
                <div style="display:flex; gap:8px; flex-grow:1; max-width:400px;">
                    <input type="text" id="wallet-input" placeholder="Enter rAddress..." style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border-color); outline:none; background: var(--bg-input); color: var(--text-main);">
                    <button class="btn" style="padding: 8px 16px;" onclick="addWallets()">Add</button>
                </div>
            </div>
            <div class="silo-grid" id="silo-grid"></div>
        </div>
    </main>

    <script>
        const STORAGE_KEY = 'corn_silo_secure_v7';
        const RPC_URL = "https://xrplcluster.com";
        let vaultData = [];
        let currentPin = '';
        let xrpUsd = 0.0;

        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function toggleAcc(el) { el.parentElement.classList.toggle('open'); }

        // Dialogue Helper
        function siloTalk(msg) {
            const bubble = document.getElementById('silo-speech');
            if (bubble) {
                bubble.style.animation = 'none';
                bubble.offsetHeight; // trigger reflow
                bubble.style.animation = 'fadeIn 0.5s ease-out';
                bubble.textContent = msg;
            }
        }

        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "Good morning, Corn! Ready for a harvest?";
            if (hour >= 12 && hour < 17) return "Good afternoon, Corn. How was lunch? Let's check the grains.";
            if (hour >= 17 && hour < 21) return "Good evening, Corn. The fields are looking stable.";
            return "Late night grind, Corn? Let's keep these grains safe.";
        }

        async function rpc(method, params) {
            try {
                const response = await fetch(RPC_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method, params: [params] })
                });
                const data = await response.json();
                return data.result;
            } catch (e) { return null; }
        }

        async function fetchPrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=usd');
                const data = await res.json();
                xrpUsd = data.ripple.usd;
                document.getElementById('price-box').textContent = `XRP: $${xrpUsd.toFixed(4)}`;
            } catch (e) {
                try {
                    const res2 = await fetch('https://min-api.cryptocompare.com/data/price?fsym=XRP&tsyms=USD');
                    const data2 = await res2.json();
                    xrpUsd = data2.USD;
                    document.getElementById('price-box').textContent = `XRP: $${xrpUsd.toFixed(4)}`;
                } catch (e2) {
                    document.getElementById('price-box').textContent = "XRP: Offline";
                }
            }
        }

        async function getTokenPrice(currency, issuer) {
            try {
                const res = await rpc('amm_info', { asset: { currency, issuer }, asset2: { currency: 'XRP' } });
                if (!res || !res.amm) return 0;
                let xrp, tok;
                const amt1 = res.amm.amount;
                const amt2 = res.amm.amount2;
                if (typeof amt1 === 'string') {
                    xrp = parseInt(amt1) / 1e6;
                    tok = parseFloat(amt2.value);
                } else {
                    xrp = parseInt(amt2) / 1e6;
                    tok = parseFloat(amt1.value);
                }
                return tok > 0 ? xrp / tok : 0;
            } catch (e) { return 0; }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            document.getElementById('lock-btn').style.display = (id === 'dash') ? 'block' : 'none';
        }

        function initVault() {
            const pin = document.getElementById('setup-pin').value;
            if (pin.length !== 6) return;
            currentPin = pin;
            vaultData = [];
            saveVault();
            showScreen('dash');
            siloTalk(getTimeGreeting());
            start();
        }

        function unlockVault() {
            const pin = document.getElementById('login-pin').value;
            const enc = localStorage.getItem(STORAGE_KEY);
            if(!enc) return;
            try {
                const bytes = CryptoJS.AES.decrypt(enc, pin);
                const dec = bytes.toString(CryptoJS.enc.Utf8);
                if (!dec) throw new Error();
                vaultData = JSON.parse(dec);
                currentPin = pin;
                showScreen('dash');
                siloTalk(getTimeGreeting());
                start();
            } catch (e) {
                document.getElementById('login-err').textContent = "Invalid PIN";
            }
        }

        function saveVault() {
            if (!currentPin) return;
            const enc = CryptoJS.AES.encrypt(JSON.stringify(vaultData), currentPin).toString();
            localStorage.setItem(STORAGE_KEY, enc);
        }

        function lockApp() {
            currentPin = '';
            showScreen('login');
            document.getElementById('login-pin').value = '';
        }

        async function start() {
            await fetchPrice();
            render();
        }

        function addWallets() {
            const addr = document.getElementById('wallet-input').value.trim();
            if (addr.startsWith('r') && !vaultData.includes(addr)) {
                vaultData.push(addr);
                saveVault();
                siloTalk(`Adding ${addr.slice(0,6)}... to the bin. Harvesting data now.`);
                render();
            } else if (vaultData.includes(addr)) {
                siloTalk("Corn, we've already got that one in the bin!");
            }
            document.getElementById('wallet-input').value = '';
        }

        function render() {
            const grid = document.getElementById('silo-grid');
            grid.innerHTML = '';
            vaultData.forEach(addr => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${addr}`;
                card.innerHTML = `<div style="text-align:center; padding:20px;"><i class="ph ph-spinner spin"></i> Fetching...</div>`;
                grid.appendChild(card);
                fetchSilo(addr);
            });
        }

        async function fetchSilo(addr) {
            try {
                const info = await rpc('account_info', { account: addr, ledger_index: 'validated' });
                if (!info) throw new Error();
                const lines = await rpc('account_lines', { account: addr });
                
                const bal = parseInt(info.account_data.Balance) / 1e6;
                const objs = info.account_data.OwnerCount || 0;
                
                const reserve = 1 + (objs * 0.2);
                const spendable = Math.max(0, bal - reserve);
                let totalXrpValue = bal;

                const activeLines = (lines && lines.lines) ? lines.lines.filter(l => parseFloat(l.balance) > 0) : [];
                const pricedTokens = await Promise.all(activeLines.map(async l => {
                    const price = await getTokenPrice(l.currency, l.account);
                    const valXrp = parseFloat(l.balance) * price;
                    totalXrpValue += valXrp;
                    return { ...l, valXrp };
                }));

                pricedTokens.sort((a,b) => b.valXrp - a.valXrp);

                const card = document.getElementById(`card-${addr}`);
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <small style="color:var(--text-muted); font-family:monospace;">${addr.slice(0,8)}...${addr.slice(-8)}</small>
                        <i class="ph-fill ph-check-circle" style="color:var(--accent-green)"></i>
                    </div>
                    <div class="silo-bal">${bal.toLocaleString(undefined, {minimumFractionDigits:2})} <span>XRP</span></div>
                    <div class="silo-usd">$${(totalXrpValue * xrpUsd).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
                    
                    <div class="silo-stats">
                        <div class="stat-col"><span class="stat-lbl">Spendable</span><span class="stat-val">${spendable.toFixed(2)}</span></div>
                        <div class="stat-col"><span class="stat-lbl">Reserved</span><span class="stat-val">${reserve.toFixed(2)}</span></div>
                    </div>

                    <div class="accordion">
                        <div class="acc-header" onclick="toggleAcc(this)"><span>Storage Bin (${activeLines.length})</span><i class="ph ph-caret-down"></i></div>
                        <div class="acc-body">
                            ${pricedTokens.map(t => {
                                const avatar = `https://xumm.app/avatar/${t.account}_200.png`;
                                return `
                                <div class="list-row">
                                    <div style="display:flex; align-items:center; gap:10px;">
                                        <img src="${avatar}" class="token-icon" onerror="this.onerror=null;this.src='https://via.placeholder.com/24?text=${t.currency[0]}'">
                                        <div>
                                            <strong>${t.currency.length > 3 ? 'TOKEN' : t.currency}</strong><br>
                                            <small style="color:var(--text-muted); font-size:0.8em;">${parseFloat(t.balance).toLocaleString()}</small>
                                        </div>
                                    </div>
                                    <div style="text-align:right">
                                        <div style="color:var(--accent-green); font-weight:600;">$${(t.valXrp * xrpUsd).toFixed(2)}</div>
                                        <small style="font-size:0.7em;">${t.valXrp.toFixed(2)} XRP</small>
                                    </div>
                                </div>`;
                            }).join('') || '<div class="list-row">Silo Empty</div>'}
                        </div>
                    </div>
                    <button onclick="removeWallet('${addr}')" style="position:absolute; top:5px; right:5px; background:none; border:none; color:var(--accent-red); cursor:pointer; opacity:0.3; font-size:1.4em;">&times;</button>
                `;
            } catch (e) {
                document.getElementById(`card-${addr}`).innerHTML = `<div style="padding:20px; text-align:center; color:var(--accent-red);">Unfunded / Address Error</div>`;
            }
        }

        function removeWallet(addr) {
            vaultData = vaultData.filter(a => a !== addr);
            saveVault();
            siloTalk(`Removed wallet ${addr.slice(0,6)}... Corn, that's one less to watch.`);
            render();
        }

        window.onload = () => {
            if (localStorage.getItem(STORAGE_KEY)) showScreen('login');
            else showScreen('setup');
        };
    </script>
</body>
</html>
}
