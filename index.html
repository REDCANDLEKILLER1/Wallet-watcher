    <style>
        :root {
            --bg-body: #F9F7F1;
            --bg-card: #FFFFFF;
            --bg-input: #F3F0E6;
            --text-main: #2D2A26;

        .dark-mode {
            --bg-body: #161512;

        .acc-body { max-height: 0; overflow-y: auto; transition: max-height 0.3s ease-out; background: var(--bg-card); }
        .accordion.open .acc-body { max-height: 300px; border-top: 1px solid var(--border-color); }
        
        .list-row { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--border-color); font-size: 0.85em; align-items: center; }

        @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }
        .screen { display: none; }
        .screen.active { display: block; }
        .spin { animation: rotation 1s linear infinite; display: inline-block; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ambient-bg" id="ambient-bg"></div>

    <header>
        <div class="brand"><i class="ph-fill ph-barn"></i> CORN SILO</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="price-status" style="font-size: 0.85em; color: var(--accent-green); font-weight: 600;"></div>
            <div id="conn-status" style="font-size: 0.8em; color: var(--text-muted);"></div>
            <button class="btn" style="padding: 8px;" onclick="toggleTheme()"><i class="ph ph-sun-horizon"></i></button>
            <button class="btn" id="lock-btn" style="display:none; color: var(--accent-red); padding: 8px;" onclick="lockApp()"><i class="ph ph-lock"></i></button>
        </div>
    </header>

    <main>
        <div id="screen-setup" class="screen">
            <div class="auth-card">
                <h2>Initialize Silo</h2>
                <p style="color: var(--text-muted); margin-bottom: 10px;">Set a 6-digit PIN to secure your grain.</p>
                <input type="password" id="setup-pin" class="pin-input" maxlength="6" placeholder="000000" inputmode="numeric">
                <button class="btn btn-primary" onclick="initVault()">Create Workspace</button>
            </div>
        </div>

        <div id="screen-login" class="screen">
            <div class="auth-card">
                <h2>Silo Locked</h2>
                <p style="color: var(--text-muted);">Enter 6-digit PIN to unlock.</p>
                <input type="password" id="login-pin" class="pin-input" maxlength="6" placeholder="000000" inputmode="numeric">
                <button class="btn btn-primary" onclick="unlockVault()">Unlock Silo</button>
                <div id="login-err" style="color: var(--accent-red); margin-top: 12px; font-size: 0.9em; min-height:20px;"></div>
            </div>
        </div>

        <div id="screen-dash" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <h1>Portfolio Silo</h1>
                <div style="display: flex; gap: 10px; flex-grow: 1; max-width: 450px;">
                    <input type="text" id="wallet-input" placeholder="Paste r-addresses here..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-main); outline: none;">
                    <button class="btn btn-primary" style="width: auto; margin-top: 0;" onclick="addWallets()">Add</button>
                </div>
            </div>
            <div class="silo-grid" id="silo-grid"></div>
        </div>
    </main>

    <footer>
        <p><strong>Powered by Corn</strong> | Precise execution on XRPL</p>
    </footer>

    <script>
        const STORAGE_KEY = 'corn_silo_v3';
        let vaultData = [];
        let currentPin = '';
        let client = new xrpl.Client("wss://xrplcluster.com");
        
        let xrpUsdPrice = 0;
        const tokenPriceCache = {};
        const walletCache = {}; 

        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function toggleAcc(el) { el.parentElement.classList.toggle('open'); }
        function sanitizeHTML(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

        function decodeCurrency(code) {
            if (!code || code.length <= 3) return sanitizeHTML(code);
            if (code.length === 40) {
                let hex = code.replace(/0+$/, '');
                if (hex.length % 2 !== 0) hex += '0';
                if (hex.startsWith('02')) hex = hex.slice(2);
                if (code.startsWith('03')) return sanitizeHTML(code.slice(0, 8) + '...');
                let decoded = '';
                for (let i = 0; i < hex.length; i += 2) {
                    const c = parseInt(hex.substr(i, 2), 16);
                    if (c >= 32 && c <= 126) decoded += String.fromCharCode(c);
                }
                if (decoded.length >= 1 && decoded.length <= 20 && /^[A-Za-z0-9$_.+\-! ]+$/.test(decoded)) {
                    return sanitizeHTML(decoded.trim());
                }
                return sanitizeHTML(code.slice(0, 8) + '...');
            }
            return sanitizeHTML(code);
        }

        async function fetchXrpPrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=usd');
                const data = await res.json();
                if (data.ripple?.usd) {
                    xrpUsdPrice = data.ripple.usd;
                    document.getElementById('price-status').textContent = `XRP: $${xrpUsdPrice.toFixed(4)}`;
                }
            } catch (e) {
                try {
                    const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=XRPUSDT');
                    const data = await res.json();
                    if (data.price) {
                        xrpUsdPrice = parseFloat(data.price);
                        document.getElementById('price-status').textContent = `XRP: $${xrpUsdPrice.toFixed(4)}`;
                    }
                } catch (err) {}
            }
        }

        async function fetchTokenPrice(currency, issuer) {
            const cacheKey = `${currency}|${issuer}`;
            if (tokenPriceCache[cacheKey]) return tokenPriceCache[cacheKey];
            
            let priceInXrp = 0;
            try {
                // 1. Try AMM
                const ammReq = await client.request({command: 'amm_info', asset: {currency, issuer}, asset2: {currency: 'XRP'}});
                if (ammReq.result?.amm) {
                    const amm = ammReq.result.amm;
                    let xrpDrops = 0, tokenAmt = 0;
                    if (typeof amm.amount === 'string') { xrpDrops = parseInt(amm.amount); tokenAmt = parseFloat(amm.amount2.value); }
                    else { xrpDrops = parseInt(amm.amount2); tokenAmt = parseFloat(amm.amount.value); }
                    if (tokenAmt > 0) priceInXrp = (xrpDrops / 1000000) / tokenAmt;
                }
            } catch (e) {}

            if (priceInXrp === 0) {
                // 2. Try DEX Orderbook
                try {
                    const [bidReq, askReq] = await Promise.allSettled([
                        client.request({command: 'book_offers', taker_gets: {currency: 'XRP'}, taker_pays: {currency, issuer}, limit: 1}),
                        client.request({command: 'book_offers', taker_gets: {currency, issuer}, taker_pays: {currency: 'XRP'}, limit: 1})
                    ]);
                    
                    let bp = 0, ap = 0;
                    if (bidReq.status === 'fulfilled' && bidReq.value.result.offers?.length > 0) {
                        const o = bidReq.value.result.offers[0];
                        const gets = typeof o.TakerGets === 'string' ? parseInt(o.TakerGets)/1e6 : parseFloat(o.TakerGets.value);
                        const pays = typeof o.TakerPays === 'string' ? parseInt(o.TakerPays)/1e6 : parseFloat(o.TakerPays.value);
                        if (pays > 0 && o.owner_funds !== "0") bp = gets / pays;
                    }
                    if (askReq.status === 'fulfilled' && askReq.value.result.offers?.length > 0) {
                        const o = askReq.value.result.offers[0];
                        const pays = typeof o.TakerPays === 'string' ? parseInt(o.TakerPays)/1e6 : parseFloat(o.TakerPays.value);
                        const gets = typeof o.TakerGets === 'string' ? parseInt(o.TakerGets)/1e6 : parseFloat(o.TakerGets.value);
                        if (gets > 0 && o.owner_funds !== "0") ap = pays / gets;
                    }
                    priceInXrp = (bp > 0 && ap > 0) ? (bp + ap) / 2 : (bp || ap || 0);
                } catch(e) {}
            }
            
            tokenPriceCache[cacheKey] = priceInXrp;
            return priceInXrp;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.getElementById('lock-btn').style.display = (id === 'dash') ? 'inline-flex' : 'none';
        }

        function initVault() {
            const pin = document.getElementById('setup-pin').value;
            if (pin.length !== 6) { document.getElementById('setup-err').textContent = "PIN must be exactly 6 digits."; return; }
            document.getElementById('setup-err').textContent = "";
            currentPin = pin;
            vaultData = [];
            saveVault();
            showScreen('dash');
            startClient();
        }

        function unlockVault() {
            const pin = document.getElementById('login-pin').value;
            const encrypted = localStorage.getItem(STORAGE_KEY);
            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, pin);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if (!decrypted) throw new Error();
                vaultData = JSON.parse(decrypted);
                currentPin = pin;
                document.getElementById('login-err').textContent = "";
                showScreen('dash');
                startClient();
            } catch (e) { document.getElementById('login-err').textContent = "Decryption failed. Invalid PIN."; }
        }

        function saveVault() {
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(vaultData), currentPin).toString();
            localStorage.setItem(STORAGE_KEY, encrypted);
        }

        function lockApp() {
            currentPin = ''; vaultData = []; document.getElementById('login-pin').value = '';
            showScreen('login');
        }

        async function startClient() {
            const status = document.getElementById('conn-status');
            status.innerHTML = '<i class="ph ph-spinner spin"></i> Connecting...';
            status.style.color = 'var(--accent-gold)';
            fetchXrpPrice();
            try {
                if (!client.isConnected()) await client.connect();
                status.innerHTML = '<i class="ph-fill ph-wifi-high"></i> Connected';
                status.style.color = 'var(--accent-green)';
                renderGrid();
            } catch (e) { 
                status.innerHTML = '<i class="ph-fill ph-warning-circle"></i> Offline';
                status.style.color = 'var(--accent-red)';
            }
        }

        function addWallets() {
            const val = document.getElementById('wallet-input').value;
            const addrs = val.split(/[\s,]+/).filter(a => a.startsWith('r'));
            let added = false;
            addrs.forEach(a => { if(!vaultData.includes(a)) { vaultData.push(a); added = true; } });
            if (added) { saveVault(); renderGrid(); }
            document.getElementById('wallet-input').value = '';
        }

        function removeWallet(addr) {
            if(window.confirm("Remove this silo from the dashboard?")) {
                vaultData = vaultData.filter(v => v !== addr);
                delete walletCache[addr];
                saveVault();
                renderGrid();
            }
        }

        function renderGrid() {
            const grid = document.getElementById('silo-grid');
            grid.innerHTML = '';
            if(vaultData.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px; border: 2px dashed var(--border-color); border-radius: 12px;">The silos are empty. Add an XRPL address above.</div>';
                return;
            }

            vaultData.forEach(addr => {
                const card = document.createElement('div');
                card.className = 'card silo';
                card.id = `card-${addr}`;
                
                if (walletCache[addr]) {
                    card.innerHTML = walletCache[addr].html;
                    grid.appendChild(card);
                    card.querySelectorAll('.acc-header').forEach(h => { h.onclick = function() { toggleAcc(this); }; });
                } else {
                    card.innerHTML = `
                        <div class="silo-top">
                            <small style="color:var(--text-muted); font-family: monospace;">${addr}</small>
                            <div style="display: flex; gap: 8px;">
                                <span id="sync-${addr}" style="font-size: 0.8em; color: var(--accent-gold); display: flex; align-items: center; gap: 4px;"><i class="ph ph-spinner spin"></i> Sync</span>
                                <button class="btn" style="padding: 4px; border:none; background:transparent; color: var(--text-muted);" onclick="removeWallet('${addr}')"><i class="ph ph-trash" style="font-size: 1.2em;"></i></button>
                            </div>
                        </div>
                        <div class="silo-bal" id="bal-${addr}">--- <span>XRP</span></div>
                        <div class="silo-usd" id="usd-${addr}">$---</div>
                        
                        <div class="silo-stats">
                            <div class="stat-col"><span class="stat-lbl">Spendable</span><span class="stat-val" id="spend-${addr}">---</span></div>
                            <div class="stat-col"><span class="stat-lbl">Reserved</span><span class="stat-val" id="res-${addr}">---</span></div>
                        </div>
                        
                        <div class="accordion">
                            <div class="acc-header" onclick="toggleAcc(this)"><span id="tok-count-${addr}">Tokens (0)</span><i class="ph ph-caret-down acc-icon"></i></div>
                            <div class="acc-body" id="tok-${addr}"><div class="list-row" style="color: var(--text-muted); justify-content: center;">Fetching portfolio...</div></div>
                        </div>
                        <div class="accordion">
                            <div class="acc-header" onclick="toggleAcc(this)"><span>History</span><i class="ph ph-caret-down acc-icon"></i></div>
                            <div class="acc-body" id="tx-${addr}"><div class="list-row" style="color: var(--text-muted); justify-content: center;">Fetching ledger...</div></div>
                        </div>
                    `;
                    grid.appendChild(card);
                    fetchData(addr);
                }
            });
        }

        async function fetchData(addr) {
            try {
                // 1. Account Info (Balances & Reserves)
                const info = await client.request({ command: "account_info", account: addr, ledger_index: "validated" });
                const rawBal = info.result.account_data.Balance / 1e6;
                const objCount = info.result.account_data.OwnerCount || 0;
                
                // Core Math: 1 XRP Base + 0.2 XRP per object
                const reserve = 1 + (objCount * 0.2);
                const spendable = Math.max(0, rawBal - reserve);

                let totalPortfolioXrp = rawBal;

                document.getElementById(`bal-${addr}`).innerHTML = `${rawBal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span>XRP</span>`;
                document.getElementById(`spend-${addr}`).textContent = `${spendable.toLocaleString(undefined, {maximumFractionDigits: 2})} XRP`;
                document.getElementById(`res-${addr}`).textContent = `${reserve.toLocaleString(undefined, {maximumFractionDigits: 2})} XRP`;

                // 2. Lines and TXs
                const [linesReq, txsReq] = await Promise.allSettled([
                    client.request({ command: "account_lines", account: addr }),
                    client.request({ command: "account_tx", account: addr, limit: 15 })
                ]);

                // 3. Process Tokens & Value
                const tokDiv = document.getElementById(`tok-${addr}`);
                if (linesReq.status === 'fulfilled') {
                    const activeLines = linesReq.value.result.lines.filter(l => parseFloat(l.balance) > 0);
                    document.getElementById(`tok-count-${addr}`).textContent = `Tokens (${activeLines.length})`;
                    
                    if (activeLines.length > 0) {
                        let tokensHtml = '';
                        
                        // Fetch prices for all tokens concurrently
                        const pricedTokens = await Promise.all(activeLines.map(async l => {
                            const price = await fetchTokenPrice(l.currency, l.account);
                            const balance = parseFloat(l.balance);
                            const valXrp = balance * price;
                            totalPortfolioXrp += valXrp; // Add to total portfolio value
                            return { ...l, price, valXrp };
                        }));

                        // Sort by Value (Highest to Lowest)
                        pricedTokens.sort((a, b) => b.valXrp - a.valXrp);

                        tokensHtml = pricedTokens.map(t => {
                            const curName = decodeCurrency(t.currency);
                            const iconUrl = `https://xumm.app/avatar/${t.account}_200.png`;
                            const fallback = `onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"`;
                            
                            const valUsdStr = xrpUsdPrice > 0 ? `$${(t.valXrp * xrpUsdPrice).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}` : '';
                            const priceStr = t.price > 0 ? `(${t.price.toPrecision(4)} XRP/ea)` : '';

                            return `
                                <div class="list-row">
                                    <div class="token-left">
                                        <img src="${iconUrl}" class="avatar" ${fallback}>
                                        <div class="avatar" style="display:none; align-items:center; justify-content:center; border: 1px dashed var(--border-color); background: transparent;"><i class="ph ph-coins" style="color: var(--text-muted);"></i></div>
                                        <div style="display: flex; flex-direction: column;">
                                            <span style="font-weight: 600;">${curName}</span>
                                            <span style="font-size: 0.75em; color: var(--text-muted);">${parseFloat(t.balance).toLocaleString(undefined, {maximumFractionDigits: 4})} ${priceStr}</span>
                                        </div>
                                    </div>
                                    <div class="token-val">
                                        <span class="token-val-xrp">${t.valXrp > 0 ? t.valXrp.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' XRP' : '—'}</span>
                                        <span class="token-val-usd">${valUsdStr}</span>
                                    </div>
                                </div>
                            `;
                        }).join('');
                        tokDiv.innerHTML = tokensHtml;
                    } else {
                        tokDiv.innerHTML = '<div class="list-row" style="justify-content:center; color: var(--text-muted);">No tokens found</div>';
                    }
                }

                // Apply Total USD Value
                if (xrpUsdPrice > 0) {
                    const totalUsd = totalPortfolioXrp * xrpUsdPrice;
                    document.getElementById(`usd-${addr}`).textContent = `≈ $${totalUsd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                } else {
                    document.getElementById(`usd-${addr}`).textContent = `≈ ${totalPortfolioXrp.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} XRP Total`;
                }

                // 4. Process History
                const txDiv = document.getElementById(`tx-${addr}`);
                if (txsReq.status === 'fulfilled') {
                    const txs = txsReq.value.result.transactions || [];
                    if (txs.length > 0) {
                        txDiv.innerHTML = txs.map(t => {
                            const date = new Date((t.tx.date + 946684800) * 1000);
                            const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                            const isSuccess = t.meta?.TransactionResult === 'tesSUCCESS';
                            const color = isSuccess ? 'var(--text-main)' : 'var(--accent-red)';
                            const icon = isSuccess ? '<i class="ph-bold ph-check" style="color: var(--accent-green);"></i>' : '<i class="ph-bold ph-warning-circle" style="color: var(--accent-red);"></i>';
                            return `
                                <div class="list-row">
                                    <div style="display:flex; flex-direction:column; gap:2px;">
                                        <span style="font-weight: 600; color: ${color};">${t.tx.TransactionType}</span>
                                        <span style="font-size: 0.8em; color: var(--text-muted); font-family: monospace;">${dateStr}</span>
                                    </div>
                                    ${icon}
                                </div>
                            `;
                        }).join('');
                    } else { txDiv.innerHTML = '<div class="list-row" style="justify-content:center; color: var(--text-muted);">No recent history</div>'; }
                }

                // 5. Finalize Cache
                const syncEl = document.getElementById(`sync-${addr}`);
                if (syncEl) { syncEl.innerHTML = '<i class="ph-fill ph-check-circle"></i> Synced'; syncEl.style.color = 'var(--accent-green)'; }
                const card = document.getElementById(`card-${addr}`);
                if (card) walletCache[addr] = { html: card.innerHTML };

            } catch (e) {
                const card = document.getElementById(`card-${addr}`);
                const syncEl = document.getElementById(`sync-${addr}`);
                
                if (e?.data?.error === 'actNotFound' || e?.message?.includes('actNotFound')) {
                    if (document.getElementById(`bal-${addr}`)) document.getElementById(`bal-${addr}`).innerHTML = `0.00 <span style="color: var(--text-muted);">(Unfunded)</span>`;
                    if (document.getElementById(`usd-${addr}`)) document.getElementById(`usd-${addr}`).textContent = `$0.00`;
                    if (document.getElementById(`spend-${addr}`)) document.getElementById(`spend-${addr}`).textContent = `0.00 XRP`;
                    if (document.getElementById(`res-${addr}`)) document.getElementById(`res-${addr}`).textContent = `0.00 XRP`;
                    if (document.getElementById(`tok-${addr}`)) document.getElementById(`tok-${addr}`).innerHTML = '<div class="list-row" style="justify-content:center; color: var(--text-muted);">Account not activated</div>';
                    if (document.getElementById(`tx-${addr}`)) document.getElementById(`tx-${addr}`).innerHTML = '<div class="list-row" style="justify-content:center; color: var(--text-muted);">No history</div>';
                    if (syncEl) { syncEl.innerHTML = '<i class="ph-fill ph-warning-circle"></i> Unfunded'; syncEl.style.color = 'var(--accent-gold)'; }
                } else {
                    if (syncEl) { syncEl.innerHTML = '<i class="ph-fill ph-warning-octagon"></i> Error'; syncEl.style.color = 'var(--accent-red)'; }
                }
                if (card) walletCache[addr] = { html: card.innerHTML };
            }
        }

        window.onload = () => {
            const items = ['🌽', '🌾', '🚜', '🍂'];
            const bg = document.getElementById('ambient-bg');
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = items[Math.floor(Math.random()*items.length)];
                p.style.left = Math.random()*100 + 'vw';
                p.style.animationDuration = (20 + Math.random()*30) + 's';
                p.style.fontSize = (20 + Math.random()*20) + 'px';
                p.style.top = '-50px';
                bg.appendChild(p);
            }
            if (localStorage.getItem(STORAGE_KEY)) showScreen('login');
            else showScreen('setup');
            
            document.getElementById('setup-pin').addEventListener('keyup', e => { if(e.key === 'Enter') initVault(); });
            document.getElementById('login-pin').addEventListener('keyup', e => { if(e.key === 'Enter') unlockVault(); });
        };
    </script>
</body>
</html>
