<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corn Wallet Silo - Precision Build</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

    <style>
        :root {
            --bg-body: #161512;
            --bg-card: #22201C;
            --bg-input: #1A1815;
            --text-main: #F4F1EB;
            --text-muted: #A39D91;
            --accent-gold: #FFC82C;
            --accent-green: #63A375;
            --accent-red: #E66A66;
            --border-color: #38352D;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        body.light-mode {
            --bg-body: #F9F7F1;
            --bg-card: #FFFFFF;
            --bg-input: #F3F0E6;
            --text-main: #2D2A26;
            --text-muted: #7A756B;
            --accent-gold: #E5A910;
            --accent-green: #4A7C59;
            --accent-red: #D9534F;
            --border-color: #E8E4D9;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s;
            overflow-x: hidden;
        }

        #ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            transition: background 3s ease;
        }
        #sky-layer {
            position: absolute;
            inset: 0;
            transition: background 3s ease;
        }
        #sky-orb {
            position: absolute;
            border-radius: 50%;
            transition: left 3s ease, bottom 3s ease, width 3s ease, height 3s ease, background 3s ease, box-shadow 3s ease;
        }
        #horizon-glow {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 35%;
            transition: background 3s ease;
            pointer-events: none;
        }
        #star-canvas {
            position: absolute;
            inset: 0;
            transition: opacity 2s ease;
        }
        .sky-cloud {
            position: absolute;
            border-radius: 50px;
            filter: blur(6px);
            animation: cloudDrift linear infinite;
            transition: opacity 2s ease;
        }
        @keyframes cloudDrift {
            from { transform: translateX(-20vw); }
            to   { transform: translateX(115vw); }
        }
        .particle {
            position: absolute;
            opacity: 0.18;
            user-select: none;
            animation: drive linear infinite;
            z-index: 2;
        }
        @keyframes drive {
            from { transform: translateX(-15vw) rotate(0deg); }
            to   { transform: translateX(115vw) rotate(10deg); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.9; }
            50%       { opacity: 0.2; }
        }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-body);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 1.4em; font-weight: 700; color: var(--accent-gold); font-family: 'Outfit'; z-index: 2; }
        
        main { flex: 1; padding: 20px 24px; width: 100%; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        
        .speech-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.5s ease-out;
        }
        .speech-bubble {
            background: var(--accent-gold);
            color: #161512;
            padding: 12px 20px;
            border-radius: 12px 12px 12px 0;
            font-weight: 600;
            font-size: 0.95em;
            position: relative;
            box-shadow: var(--shadow);
            max-width: 80%;
        }
        .corn-avatar { font-size: 2.5em; filter: drop-shadow(0 0 5px rgba(255,200,44,0.3)); }

        .auth-card {
            max-width: 400px; margin: 60px auto; text-align: center; padding: 40px;
            background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow);
        }
        .pin-input {
            width: 100%; max-width: 240px; padding: 16px 0; background: var(--bg-input); border: 2px solid var(--border-color);
            border-radius: 12px; color: var(--text-main); text-align: center; letter-spacing: 0.5em; font-size: 1.8em; 
            font-weight: 700; font-family: 'Outfit'; margin: 20px auto; outline: none;
        }
        .btn {
            background: var(--accent-gold); color: #161512; padding: 12px 20px; 
            border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.1); }
        
        .silo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); padding: 20px; box-shadow: var(--shadow); position: relative; }
        
        .silo-bal { font-size: 1.8em; font-family: 'Outfit'; font-weight: 700; text-align: center; margin: 5px 0; }
        .silo-bal span { font-size: 0.5em; color: var(--accent-gold); }
        .silo-usd { font-size: 1.1em; color: var(--accent-green); font-weight: 600; text-align: center; margin-bottom: 12px; }
        
        .silo-stats { display: flex; justify-content: space-around; background: var(--bg-input); padding: 10px; border-radius: 8px; margin-bottom: 12px; }
        .stat-col { display: flex; flex-direction: column; align-items: center; }
        .stat-lbl { color: var(--text-muted); font-size: 0.7em; text-transform: uppercase; font-weight: 600; }
        .stat-val { font-weight: 700; font-size: 0.85em; }
        
        .accordion { border: 1px solid var(--border-color); border-radius: 8px; margin-top: 10px; overflow: hidden; }
        .acc-header { padding: 10px; background: var(--bg-input); cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85em; font-weight: 600; }
        .acc-body { max-height: 0; overflow-y: auto; transition: max-height 0.3s; background: var(--bg-card); }
        .accordion.open .acc-body { max-height: 250px; border-top: 1px solid var(--border-color); }
        
        .list-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 0.8em; align-items: center; }
        .token-icon { width: 24px; height: 24px; border-radius: 50%; background: var(--bg-input); object-fit: cover; }

        /* price source badge */
        .price-src { font-size: 0.65em; padding: 1px 4px; border-radius: 3px; font-weight: 700; margin-left: 4px; vertical-align: middle; }
        .price-src.amm  { background: rgba(99,163,117,0.2); color: var(--accent-green); }
        .price-src.dex  { background: rgba(0,204,255,0.15); color: #00ccff; }
        .price-src.lp   { background: rgba(180,100,255,0.2); color: #c084ff; }

        .lp-pool-row {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8em;
            background: linear-gradient(90deg, rgba(180,100,255,0.04) 0%, transparent 100%);
        }
        .lp-pool-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
        }
        .lp-pool-assets {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .lp-asset-pill {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .spin { animation: rotation 1s linear infinite; display: inline-block; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .screen { display: none; }
        .screen.active { display: block; }

        /* ── Totals Banner ── */
        #totals-banner {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            animation: fadeIn 0.4s ease-out;
        }
        .totals-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 110px;
        }
        .totals-lbl {
            font-size: 0.68em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        .totals-val {
            font-family: 'Outfit'; font-weight: 700;
            font-size: 1.35em;
            color: var(--text-main);
        }
        .totals-val.gold  { color: var(--accent-gold); }
        .totals-val.green { color: var(--accent-green); }
        .totals-divider {
            width: 1px; height: 40px;
            background: var(--border-color);
            flex-shrink: 0;
        }
        #report-btn {
            background: var(--accent-gold);
            color: #161512;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 0.85em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            transition: filter 0.2s;
            flex-shrink: 0;
        }
        #report-btn:hover { filter: brightness(1.1); }
        #report-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="dark-mode">
    <div id="ambient-bg">
        <div id="sky-layer"></div>
        <canvas id="star-canvas"></canvas>
        <div id="horizon-glow"></div>
        <div id="sky-orb"></div>
        <!-- clouds injected by JS -->
    </div>

    <header>
        <div class="brand"><i class="ph-fill ph-barn"></i> CORN SILO</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="price-box" style="font-weight: 600; color: var(--accent-green); font-size: 0.9em;">Calculating Yield...</div>
            <button class="btn" style="padding: 6px 10px; background: var(--bg-input); color: var(--text-main);" onclick="toggleTheme()"><i class="ph ph-moon"></i></button>
            <button class="btn" id="lock-btn" style="display:none; background: var(--accent-red); padding: 6px 10px; color: white;" onclick="lockApp()"><i class="ph ph-lock"></i></button>
        </div>
    </header>

    <main>
        <div id="screen-setup" class="screen">
            <div class="auth-card">
                <h2>Initialize Storage</h2>
                <p style="font-size: 0.8em; color: var(--text-muted); margin-bottom: 10px;">Set your 6-digit Silo Key.</p>
                <input type="password" id="setup-pin" class="pin-input" maxlength="6" inputmode="numeric" placeholder="000000">
                <button class="btn" style="width:100%" onclick="initVault()">Open Silo</button>
            </div>
        </div>

        <div id="screen-login" class="screen">
            <div class="auth-card">
                <h2>Silo Locked</h2>
                <input type="password" id="login-pin" class="pin-input" maxlength="6" inputmode="numeric">
                <button class="btn" style="width:100%" onclick="unlockVault()">Unlock Grains</button>
                <div id="login-err" style="color:var(--accent-red); margin-top:10px; font-size: 0.9em;"></div>
            </div>
        </div>

        <div id="screen-dash" class="screen">
            <div class="speech-container">
                <div class="corn-avatar">🌽</div>
                <div class="speech-bubble" id="silo-speech">Gathering the harvest data...</div>
            </div>

            <!-- Totals Banner -->
            <div id="totals-banner">
                <div class="totals-col">
                    <span class="totals-lbl">🌽 Wallets</span>
                    <span class="totals-val" id="tot-wallets">—</span>
                </div>
                <div class="totals-divider"></div>
                <div class="totals-col">
                    <span class="totals-lbl">Total XRP</span>
                    <span class="totals-val gold" id="tot-xrp">—</span>
                </div>
                <div class="totals-divider"></div>
                <div class="totals-col">
                    <span class="totals-lbl">Token Value (XRP)</span>
                    <span class="totals-val" id="tot-token-xrp">—</span>
                </div>
                <div class="totals-divider"></div>
                <div class="totals-col">
                    <span class="totals-lbl">Combined USD</span>
                    <span class="totals-val green" id="tot-usd">—</span>
                </div>
                <div class="totals-divider"></div>
                <div class="totals-col">
                    <span class="totals-lbl">Spendable XRP</span>
                    <span class="totals-val" id="tot-spendable">—</span>
                </div>
                <button id="report-btn" onclick="downloadReport()">
                    <i class="ph ph-file-doc"></i> Download Report
                </button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
                <h1>Grains</h1>
                <div style="display:flex; gap:8px; flex-grow:1; max-width:400px;">
                    <input type="text" id="wallet-input" placeholder="Paste rAddress..." style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border-color); outline:none; background: var(--bg-input); color: var(--text-main);">
                    <button class="btn" style="padding: 8px 16px;" onclick="addWallets()">Add</button>
                </div>
            </div>
            <div class="silo-grid" id="silo-grid"></div>
        </div>
    </main>

    <script>
        const STORAGE_KEY = 'corn_silo_secure_v9';
        const RPC_URL = "https://xrplcluster.com";
        let vaultData = [];
        let currentPin = '';
        let xrpUsd = 0.0;
        let tokenCache = {}; // { key: { price, source } }
        let walletSnapshots = {}; // addr → { bal, spendable, reserve, totalXrpValue, tokenXrpValue, pricedTokens }

        function updateTotals() {
            const snaps = Object.values(walletSnapshots);
            if (!snaps.length) return;
            const totalXrp      = snaps.reduce((s, w) => s + w.bal, 0);
            const totalTokenXrp = snaps.reduce((s, w) => s + w.tokenXrpValue, 0);
            const totalSpend    = snaps.reduce((s, w) => s + w.spendable, 0);
            const totalUsd      = snaps.reduce((s, w) => s + w.totalXrpValue, 0) * xrpUsd;

            document.getElementById('tot-wallets').textContent     = snaps.length;
            document.getElementById('tot-xrp').textContent         = totalXrp.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
            document.getElementById('tot-token-xrp').textContent   = totalTokenXrp.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
            document.getElementById('tot-usd').textContent         = '$' + totalUsd.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
            document.getElementById('tot-spendable').textContent   = totalSpend.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
        }

        function toggleTheme() { 
            document.body.classList.toggle('light-mode'); 
            const isLight = document.body.classList.contains('light-mode');
            document.querySelector('.ph-moon, .ph-sun').className = isLight ? 'ph ph-sun' : 'ph ph-moon';
            siloTalk(isLight ? CORN.pick(CORN.themeLight) : CORN.pick(CORN.themeDark));
        }

            const isOpen = el.parentElement.classList.toggle('open');
            siloTalk(isOpen ? CORN.pick(CORN.openAccordion) : CORN.pick(CORN.closeAccordion));
        }

        // ── Token price in XRP — AMM primary, DEX orderbook fallback ──
        // Logic ported from XRPMan Multi-Wallet Suite v4.7.1:
        //   MKT.pool()  → amm_info AMM price
        //   MKT.book()  → book_offers bid/ask midpoint
        //   wmFetchTokenPrices() → AMM first, cross-ref/average with ob within 20%
        async function getTokenPrice(currency, issuer) {
            const key = `${currency}:${issuer}`;
            if (tokenCache[key] !== undefined) return tokenCache[key];

            let ammPrice = 0;
            let obPrice  = 0;

            // ── 1. AMM pool (most accurate when it exists) ──
            try {
                const res = await rpc('amm_info', {
                    asset:  { currency, issuer },
                    asset2: { currency: 'XRP' }
                });

                if (res && res.amm) {
                    let xrpAmount = 0, tokenAmount = 0;
                    const a1 = res.amm.amount;   // whichever side XRPL put XRP on
                    const a2 = res.amm.amount2;

                    // Drops string = XRP side; object = token side
                    if (typeof a1 === 'string') {
                        xrpAmount   = parseFloat(a1) / 1_000_000;
                        tokenAmount = (a2 && typeof a2 === 'object') ? parseFloat(a2.value) : 0;
                    } else if (typeof a2 === 'string') {
                        xrpAmount   = parseFloat(a2) / 1_000_000;
                        tokenAmount = (a1 && typeof a1 === 'object') ? parseFloat(a1.value) : 0;
                    }

                    ammPrice = tokenAmount > 0 ? xrpAmount / tokenAmount : 0;
                }
            } catch {}

            // ── 2. DEX orderbook fallback (for tokens with no AMM) ──
            //    Also used to cross-reference the AMM price
            try {
                // Bid side: taker gets XRP, pays token → people buying the token
                const bidRes = await rpc('book_offers', {
                    taker_gets: { currency: 'XRP' },
                    taker_pays: { currency, issuer },
                    limit: 8
                });
                const bidOffers = (bidRes && bidRes.offers) ? bidRes.offers : [];

                // Ask side: taker gets token, pays XRP → people selling the token
                const askRes = await rpc('book_offers', {
                    taker_gets: { currency, issuer },
                    taker_pays: { currency: 'XRP' },
                    limit: 8
                });
                const askOffers = (askRes && askRes.offers) ? askRes.offers : [];

                // Weighted average across visible offers (volume-weighted, not just top of book)
                let bidPrice = 0, askPrice = 0;

                if (bidOffers.length) {
                    let tXrp = 0, tTok = 0;
                    for (const ob of bidOffers) {
                        const xrp = typeof ob.TakerGets === 'string'
                            ? parseFloat(ob.TakerGets) / 1_000_000
                            : parseFloat(ob.TakerGets?.value || 0);
                        const tok = typeof ob.TakerPays === 'string'
                            ? parseFloat(ob.TakerPays) / 1_000_000
                            : parseFloat(ob.TakerPays?.value || 0);
                        if (xrp > 0 && tok > 0) { tXrp += xrp; tTok += tok; }
                    }
                    if (tTok > 0) bidPrice = tXrp / tTok;
                }

                if (askOffers.length) {
                    let tXrp = 0, tTok = 0;
                    for (const ob of askOffers) {
                        const xrp = typeof ob.TakerPays === 'string'
                            ? parseFloat(ob.TakerPays) / 1_000_000
                            : parseFloat(ob.TakerPays?.value || 0);
                        const tok = typeof ob.TakerGets === 'string'
                            ? parseFloat(ob.TakerGets) / 1_000_000
                            : parseFloat(ob.TakerGets?.value || 0);
                        if (xrp > 0 && tok > 0) { tXrp += xrp; tTok += tok; }
                    }
                    if (tTok > 0) askPrice = tXrp / tTok;
                }

                // Mid-point of bid/ask spread
                if (bidPrice > 0 && askPrice > 0) obPrice = (bidPrice + askPrice) / 2;
                else obPrice = bidPrice || askPrice;

            } catch {}

            // ── 3. Resolve final price ──
            // AMM is primary. If orderbook is within 20% of AMM, average them (tighter estimate).
            // If only one source exists, use it. Record which source for the badge display.
            let finalPrice = 0;
            let source = 'none';

            if (ammPrice > 0 && obPrice > 0) {
                const spread = Math.abs(obPrice - ammPrice) / ammPrice;
                finalPrice = spread < 0.20 ? (ammPrice + obPrice) / 2 : ammPrice;
                source = 'amm';
            } else if (ammPrice > 0) {
                finalPrice = ammPrice;
                source = 'amm';
            } else if (obPrice > 0) {
                finalPrice = obPrice;
                source = 'dex';
            }

            tokenCache[key] = { price: finalPrice, source };
            return tokenCache[key];
        }

        // ── Decode a currency code: hex→UTF8 if possible, else short hex label ──
        function decodeCurrency(hex) {
            if (!hex || hex.length <= 3) return hex; // already 3-char
            if (hex.startsWith('03')) return null;   // LP token — handled separately
            try {
                const bytes = hex.match(/.{1,2}/g).map(b => parseInt(b, 16));
                const str = bytes.map(b => String.fromCharCode(b)).join('').replace(/\0/g, '').trim();
                if (str && /^[\x20-\x7E]+$/.test(str)) return str;
            } catch {}
            return hex.slice(0,6) + '…';
        }

        // ── Resolve AMM pool info from LP token issuer (the AMM account) ──
        async function resolveAmmPool(lpIssuer, lpBalance, lpTotalSupply) {
            try {
                const res = await rpc('amm_info', { amm_account: lpIssuer, ledger_index: 'validated' });
                if (!res || !res.amm) return null;
                const amm = res.amm;

                // Parse both pool sides
                const a1 = amm.amount;
                const a2 = amm.amount2;
                const pool1Amt = typeof a1 === 'string' ? parseFloat(a1) / 1_000_000 : parseFloat(a1?.value || 0);
                const pool2Amt = typeof a2 === 'string' ? parseFloat(a2) / 1_000_000 : parseFloat(a2?.value || 0);
                const cur1    = typeof a1 === 'string' ? 'XRP' : decodeCurrency(a1?.currency) || a1?.currency || '?';
                const cur2    = typeof a2 === 'string' ? 'XRP' : decodeCurrency(a2?.currency) || a2?.currency || '?';
                const iss1    = typeof a1 === 'string' ? null : a1?.issuer;
                const iss2    = typeof a2 === 'string' ? null : a2?.issuer;

                // LP total supply from amm_info
                const totalLp = parseFloat(amm.lp_token?.value || lpTotalSupply || 1);
                const share   = totalLp > 0 ? lpBalance / totalLp : 0;

                // Wallet's share of each pool asset
                const myAmt1 = pool1Amt * share;
                const myAmt2 = pool2Amt * share;

                // Value in XRP: price each side
                let xrpVal = 0;
                if (cur1 === 'XRP') {
                    xrpVal += myAmt1;
                    if (cur2 !== 'XRP' && iss2) {
                        const p = await getTokenPrice(a2.currency, iss2);
                        xrpVal += myAmt2 * (p ? p.price : 0);
                    } else {
                        xrpVal += myAmt2;
                    }
                } else if (cur2 === 'XRP') {
                    xrpVal += myAmt2;
                    if (iss1) {
                        const p = await getTokenPrice(a1.currency, iss1);
                        xrpVal += myAmt1 * (p ? p.price : 0);
                    }
                } else {
                    // token/token pool — price both
                    if (iss1) { const p = await getTokenPrice(a1.currency, iss1); xrpVal += myAmt1 * (p ? p.price : 0); }
                    if (iss2) { const p = await getTokenPrice(a2.currency, iss2); xrpVal += myAmt2 * (p ? p.price : 0); }
                }

                return {
                    ammAccount: lpIssuer,
                    cur1, cur2, iss1, iss2,
                    pool1Amt, pool2Amt,
                    myAmt1, myAmt2,
                    share, xrpVal,
                    fee: (amm.trading_fee || 0) / 1000,
                };
            } catch { return null; }
        }

        async function fetchSilo(addr) {
            try {
                const info = await rpc('account_info', { account: addr, ledger_index: 'validated' });
                if (!info || !info.account_data) throw new Error("Account Not Found");

                // Paginate account_lines
                let allLines = [];
                let marker = undefined;
                do {
                    const params = { account: addr, ledger_index: 'validated', limit: 400 };
                    if (marker) params.marker = marker;
                    const lines = await rpc('account_lines', params);
                    if (!lines) break;
                    allLines = allLines.concat(lines.lines || []);
                    marker = lines.marker;
                } while (marker);

                const bal   = parseInt(info.account_data.Balance) / 1_000_000;
                const objs  = info.account_data.OwnerCount || 0;
                const reserve   = 10 + (objs * 2);
                const spendable = Math.max(0, bal - reserve);
                let totalXrpValue = bal;

                // ── Split lines into LP tokens vs regular tokens ──
                const lpLines      = allLines.filter(l => l.currency?.startsWith('03') && parseFloat(l.balance) > 0);
                const regularLines = allLines.filter(l => !l.currency?.startsWith('03') && parseFloat(l.balance) > 0);

                // ── Fetch open DEX offers (may hold tokens not in trust lines) ──
                let offerTokens = [];
                try {
                    const offersRes = await rpc('account_offers', { account: addr, ledger_index: 'validated', limit: 400 });
                    const offers = offersRes?.offers || [];
                    for (const o of offers) {
                        // taker_gets is what the wallet is offering to give away (so it owns it)
                        const tg = o.taker_gets;
                        if (tg && typeof tg === 'object' && tg.currency && tg.value) {
                            const cur = decodeCurrency(tg.currency) || tg.currency;
                            // Only add if not already in regular trust lines
                            const alreadyIn = regularLines.some(l => l.currency === tg.currency && l.account === tg.issuer);
                            if (!alreadyIn && parseFloat(tg.value) > 0) {
                                offerTokens.push({ currency: tg.currency, account: tg.issuer, balance: tg.value, _fromOffer: true });
                            }
                        }
                    }
                } catch {}

                const allRegular = [...regularLines, ...offerTokens];

                // ── Price regular tokens ──
                const pricedTokens = await Promise.all(allRegular.map(async l => {
                    const result = await getTokenPrice(l.currency, l.account);
                    const priceInXrp = result ? result.price : 0;
                    const priceSource = result ? result.source : 'none';
                    const valXrp = parseFloat(l.balance) * priceInXrp;
                    totalXrpValue += valXrp;
                    return { ...l, valXrp, priceInXrp, priceSource };
                }));
                pricedTokens.sort((a, b) => b.valXrp - a.valXrp);

                // ── Resolve LP / AMM pool positions ──
                const ammPools = await Promise.all(lpLines.map(async l => {
                    const pool = await resolveAmmPool(l.account, parseFloat(l.balance), null);
                    if (pool) { totalXrpValue += pool.xrpVal; }
                    return pool ? { ...pool, lpBalance: parseFloat(l.balance) } : null;
                }));
                const resolvedPools = ammPools.filter(Boolean);

                // Store snapshot
                const tokenXrpValue = pricedTokens.reduce((s, t) => s + t.valXrp, 0)
                                    + resolvedPools.reduce((s, p) => s + p.xrpVal, 0);
                walletSnapshots[addr] = { bal, spendable, reserve, totalXrpValue, tokenXrpValue, pricedTokens, activeLines: allRegular, ammPools: resolvedPools };
                updateTotals();

                // Mascot
                if (bal >= 5000) siloTalk(CORN.pick(CORN.loaded)(addr, bal));
                else if (bal < 20) siloTalk(CORN.pick(CORN.light)(addr));
                else if (resolvedPools.length > 0) siloTalk(`${addr.slice(0,6)} is in the liquidity pool game! ${resolvedPools.length} AMM position${resolvedPools.length>1?'s':''} detected. Fancy farmer! 🌊🌽`);
                else if (allRegular.length >= 5) siloTalk(CORN.pick(CORN.tokenRich)(addr, allRegular.length));
                else if (allRegular.length === 0 && resolvedPools.length === 0) siloTalk(CORN.pick(CORN.noTokens)(addr));
                else siloTalk(CORN.pick(CORN.addWallet)(addr));

                // ── Render card ──
                const card = document.getElementById(`card-${addr}`);

                const tokenRows = pricedTokens.map(t => {
                    const isOffer = t._fromOffer;
                    const cur = decodeCurrency(t.currency) || t.currency;
                    const avatar = `https://xumm.app/avatar/${t.account}_200.png`;
                    const srcBadge = t.priceSource !== 'none'
                        ? `<span class="price-src ${t.priceSource}">${t.priceSource.toUpperCase()}</span>`
                        : '';
                    const offerBadge = isOffer ? `<span class="price-src dex" style="margin-left:4px;">OFFER</span>` : '';
                    return `<div class="list-row">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <img src="${avatar}" class="token-icon" onerror="this.onerror=null;this.src='https://via.placeholder.com/24?text=${(cur||'?')[0]}'">
                            <div>
                                <strong>${cur}</strong>${srcBadge}${offerBadge}<br>
                                <small style="color:var(--text-muted);font-size:0.8em;">${parseFloat(t.balance).toLocaleString()}</small>
                            </div>
                        </div>
                        <div style="text-align:right">
                            <div style="color:var(--accent-green);font-weight:600;">$${(t.valXrp * xrpUsd).toFixed(2)}</div>
                            <small style="font-size:0.7em;">${t.valXrp.toFixed(2)} XRP</small>
                        </div>
                    </div>`;
                }).join('') || '<div class="list-row">No tokens found</div>';

                const poolRows = resolvedPools.map(p => {
                    const fmtAmt = n => n < 0.0001 ? n.toExponential(2) : n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:6});
                    return `<div class="lp-pool-row">
                        <div class="lp-pool-header">
                            <span><span class="price-src lp">LP</span> <strong>${p.cur1} / ${p.cur2}</strong></span>
                            <div style="text-align:right">
                                <div style="color:#c084ff;font-weight:600;">$${(p.xrpVal * xrpUsd).toFixed(2)}</div>
                                <small style="font-size:0.7em;">${p.xrpVal.toFixed(2)} XRP est.</small>
                            </div>
                        </div>
                        <div class="lp-pool-assets">
                            <span class="lp-asset-pill">${fmtAmt(p.myAmt1)} ${p.cur1}</span>
                            <span style="color:var(--text-muted);align-self:center;">+</span>
                            <span class="lp-asset-pill">${fmtAmt(p.myAmt2)} ${p.cur2}</span>
                        </div>
                        <div style="margin-top:5px;color:var(--text-muted);font-size:0.75em;">
                            Pool share: ${(p.share * 100).toFixed(4)}% &nbsp;·&nbsp; Fee: ${p.fee.toFixed(3)}%
                            &nbsp;·&nbsp; <a href="https://xrpscan.com/amm/${p.ammAccount}" target="_blank" style="color:#c084ff;text-decoration:none;">View Pool ↗</a>
                        </div>
                    </div>`;
                }).join('');

                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                        <small style="color:var(--text-muted);font-family:monospace;">${addr.slice(0,8)}...${addr.slice(-8)}</small>
                        <i class="ph-fill ph-check-circle" style="color:var(--accent-green)"></i>
                    </div>
                    <div class="silo-bal">${bal.toLocaleString(undefined, {minimumFractionDigits:2})} <span>XRP</span></div>
                    <div class="silo-usd">$${(totalXrpValue * xrpUsd).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})} TOTAL</div>

                    <div class="silo-stats">
                        <div class="stat-col"><span class="stat-lbl">Available</span><span class="stat-val">${spendable.toFixed(2)}</span></div>
                        <div class="stat-col"><span class="stat-lbl">Reserve</span><span class="stat-val">${reserve.toFixed(2)}</span></div>
                        ${resolvedPools.length > 0 ? `<div class="stat-col"><span class="stat-lbl">AMM Pools</span><span class="stat-val" style="color:#c084ff;">${resolvedPools.length}</span></div>` : ''}
                    </div>

                    ${resolvedPools.length > 0 ? `
                    <div class="accordion">
                        <div class="acc-header" onclick="toggleAcc(this)" style="border-left:3px solid #c084ff;">
                            <span>🌊 AMM Pools (${resolvedPools.length})</span><i class="ph ph-caret-down"></i>
                        </div>
                        <div class="acc-body">${poolRows}</div>
                    </div>` : ''}

                    <div class="accordion">
                        <div class="acc-header" onclick="toggleAcc(this)">
                            <span>Storage Bin (${pricedTokens.length}${offerTokens.length > 0 ? ` + ${offerTokens.length} offer` : ''})</span>
                            <i class="ph ph-caret-down"></i>
                        </div>
                        <div class="acc-body">${tokenRows}</div>
                    </div>

                    <button onclick="removeWallet('${addr}')" style="position:absolute;top:5px;right:5px;background:none;border:none;color:var(--accent-red);cursor:pointer;opacity:0.3;font-size:1.4em;">&times;</button>
                `;
            } catch (e) {
                console.error(`fetchSilo error for ${addr}:`, e);
                siloTalk(CORN.pick(CORN.error)(addr));
                const isNetworkError = e instanceof TypeError && e.message.includes('fetch');
                const msg = isNetworkError
                    ? 'Network error — check your connection.'
                    : (e.message || 'Address unfunded, inactive, or request failed.');
                document.getElementById(`card-${addr}`).innerHTML =
                    `<div style="padding:20px;text-align:center;color:var(--accent-red);font-size:0.8em;">${msg}</div>`;
            }
        }

        function removeWallet(addr) {
            vaultData = vaultData.filter(a => a !== addr);
            delete walletSnapshots[addr];
            saveVault();
            siloTalk(CORN.pick(CORN.removeWallet)(addr));
            render();
        }

        window.onload = () => {
            initAmbient();
            if (localStorage.getItem(STORAGE_KEY)) showScreen('login');
            else showScreen('setup');
        };

        async function downloadReport() {
            const btn = document.getElementById('report-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner spin"></i> Building...';
            siloTalk("Printing the harvest ledger... the accountant crow is busy.");

            try {
                const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
                        AlignmentType, HeadingLevel, BorderStyle, WidthType, ShadingType,
                        LevelFormat } = docx;

                const snaps = Object.entries(walletSnapshots);
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
                const timeStr = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

                const totalXrp      = snaps.reduce((s,[,w]) => s + w.bal, 0);
                const totalTokenXrp = snaps.reduce((s,[,w]) => s + w.tokenXrpValue, 0);
                const totalSpend    = snaps.reduce((s,[,w]) => s + w.spendable, 0);
                const totalUsd      = snaps.reduce((s,[,w]) => s + w.totalXrpValue, 0) * xrpUsd;
                const grandXrp      = totalXrp + totalTokenXrp;

                const border = { style: BorderStyle.SINGLE, size: 1, color: "DDDDDD" };
                const borders = { top: border, bottom: border, left: border, right: border };
                const cellMargins = { top: 80, bottom: 80, left: 120, right: 120 };

                function hdr(text, level = HeadingLevel.HEADING_1) {
                    return new Paragraph({ heading: level, children: [new TextRun({ text, bold: true })] });
                }
                function para(text, opts = {}) {
                    return new Paragraph({ children: [new TextRun({ text, ...opts })], spacing: { after: 120 } });
                }
                function spacer() {
                    return new Paragraph({ children: [new TextRun("")], spacing: { after: 80 } });
                }
                function rule() {
                    return new Paragraph({
                        border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: "C8A000", space: 1 } },
                        spacing: { after: 200 },
                        children: [new TextRun("")]
                    });
                }
                function twoColTable(rows, colW = [4680, 4680]) {
                    return new Table({
                        width: { size: 9360, type: WidthType.DXA },
                        columnWidths: colW,
                        rows: rows.map(([label, value], i) => new TableRow({
                            children: [
                                new TableCell({
                                    borders, margins: cellMargins,
                                    width: { size: colW[0], type: WidthType.DXA },
                                    shading: { fill: i % 2 === 0 ? "FFF8E1" : "FFFFFF", type: ShadingType.CLEAR },
                                    children: [new Paragraph({ children: [new TextRun({ text: label, bold: true, size: 20 })] })]
                                }),
                                new TableCell({
                                    borders, margins: cellMargins,
                                    width: { size: colW[1], type: WidthType.DXA },
                                    shading: { fill: i % 2 === 0 ? "FFF8E1" : "FFFFFF", type: ShadingType.CLEAR },
                                    children: [new Paragraph({ children: [new TextRun({ text: value, size: 20 })] })]
                                })
                            ]
                        }))
                    });
                }

                // ── Build document children ──
                const children = [];

                // Cover header
                children.push(new Paragraph({
                    alignment: AlignmentType.CENTER,
                    spacing: { after: 100 },
                    children: [new TextRun({ text: "🌽 CORN SILO — HARVEST REPORT", bold: true, size: 40, color: "B8860B" })]
                }));
                children.push(new Paragraph({
                    alignment: AlignmentType.CENTER,
                    spacing: { after: 60 },
                    children: [new TextRun({ text: `Generated on ${dateStr} at ${timeStr}`, size: 20, color: "888888" })]
                }));
                children.push(new Paragraph({
                    alignment: AlignmentType.CENTER,
                    spacing: { after: 60 },
                    children: [new TextRun({ text: `XRP/USD Rate: $${xrpUsd.toFixed(4)}`, size: 20, color: "888888" })]
                }));
                children.push(rule());

                // Executive Summary prose
                children.push(hdr("Executive Summary"));
                children.push(para(
                    `This report summarises the complete holdings across ${snaps.length} XRPL wallet${snaps.length !== 1 ? 's' : ''} tracked in your Corn Silo on ${dateStr}. ` +
                    `At the time of this report, the combined portfolio holds ${totalXrp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} XRP in native balance ` +
                    `plus an additional ${totalTokenXrp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} XRP equivalent in Layer-2 tokens, ` +
                    `bringing the grand total portfolio value to approximately ${grandXrp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} XRP ` +
                    `(USD $${totalUsd.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} at the current rate). ` +
                    `Of the total XRP balance, ${totalSpend.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} XRP is freely spendable after accounting for network reserves.`
                ));
                children.push(spacer());

                // Portfolio summary table
                children.push(hdr("Portfolio Overview", HeadingLevel.HEADING_2));
                children.push(twoColTable([
                    ["Number of Wallets",        snaps.length.toString()],
                    ["Total Native XRP Balance",  totalXrp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                    ["Total Token Value (XRP eq.)", totalTokenXrp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                    ["Grand Portfolio Value (XRP)", grandXrp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                    ["Grand Portfolio Value (USD)", "$" + totalUsd.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})],
                    ["Total Spendable XRP",        totalSpend.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                    ["XRP/USD Rate Used",           "$" + xrpUsd.toFixed(4)],
                ]));
                children.push(spacer());
                children.push(rule());

                // Per-wallet detail
                children.push(hdr("Wallet-by-Wallet Breakdown"));

                for (const [addr, w] of snaps) {
                    const walletUsd = w.totalXrpValue * xrpUsd;
                    children.push(hdr(`Wallet: ${addr.slice(0,8)}...${addr.slice(-8)}`, HeadingLevel.HEADING_2));
                    children.push(para(
                        `This wallet holds ${w.bal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} XRP in its native balance. ` +
                        `After deducting the XRPL network reserve of ${w.reserve.toFixed(2)} XRP (which covers the base reserve and object ownership costs), ` +
                        `${w.spendable.toFixed(2)} XRP is available to spend or send. ` +
                        `Including the estimated value of all held tokens, the total portfolio value for this wallet is approximately ` +
                        `${w.totalXrpValue.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} XRP ` +
                        `(USD $${walletUsd.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}).`
                    ));
                    children.push(spacer());

                    // Wallet summary table
                    children.push(twoColTable([
                        ["Full Address",      addr],
                        ["XRP Balance",       w.bal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                        ["Spendable XRP",     w.spendable.toFixed(2) + " XRP"],
                        ["Reserve Held",      w.reserve.toFixed(2) + " XRP"],
                        ["Token Value (XRP)", w.tokenXrpValue.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                        ["Total Value (XRP)", w.totalXrpValue.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " XRP"],
                        ["Total Value (USD)", "$" + walletUsd.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})],
                        ["Active Trust Lines", w.activeLines.length.toString()],
                    ], [3500, 5860]));

                    // Token detail table
                    if (w.pricedTokens.length > 0) {
                        children.push(spacer());
                        children.push(hdr("Token Holdings", HeadingLevel.HEADING_3 || HeadingLevel.HEADING_2));

                        const tokenRows = w.pricedTokens.map((t, i) => {
                            const cur = (t.currency && t.currency.length > 3)
                                ? ((() => { try { const b=t.currency.match(/.{1,2}/g).map(x=>parseInt(x,16)); const s=b.map(x=>String.fromCharCode(x)).join('').replace(/\0/g,'').trim(); return /^[\x20-\x7E]+$/.test(s)?s:t.currency.slice(0,8)+'…'; } catch{ return t.currency.slice(0,8)+'…'; } })())
                                : (t.currency || '?');
                            return new TableRow({
                                children: [
                                    new TableCell({ borders, margins: cellMargins, width: { size: 2000, type: WidthType.DXA }, shading: { fill: i%2===0?"FFF8E1":"FFFFFF", type: ShadingType.CLEAR }, children: [new Paragraph({ children: [new TextRun({ text: cur, bold: true, size: 18 })] })] }),
                                    new TableCell({ borders, margins: cellMargins, width: { size: 2500, type: WidthType.DXA }, shading: { fill: i%2===0?"FFF8E1":"FFFFFF", type: ShadingType.CLEAR }, children: [new Paragraph({ children: [new TextRun({ text: parseFloat(t.balance).toLocaleString(), size: 18 })] })] }),
                                    new TableCell({ borders, margins: cellMargins, width: { size: 2430, type: WidthType.DXA }, shading: { fill: i%2===0?"FFF8E1":"FFFFFF", type: ShadingType.CLEAR }, children: [new Paragraph({ children: [new TextRun({ text: t.valXrp.toFixed(4)+" XRP", size: 18 })] })] }),
                                    new TableCell({ borders, margins: cellMargins, width: { size: 2430, type: WidthType.DXA }, shading: { fill: i%2===0?"FFF8E1":"FFFFFF", type: ShadingType.CLEAR }, children: [new Paragraph({ children: [new TextRun({ text: "$"+(t.valXrp*xrpUsd).toFixed(2), size: 18 })] })] }),
                                ]
                            });
                        });
                        const tokenHdrRow = new TableRow({ children: ["Token","Balance","Value (XRP)","Value (USD)"].map((h,ci)=>new TableCell({ borders, margins: cellMargins, width:{size:[2000,2500,2430,2430][ci],type:WidthType.DXA}, shading:{fill:"C8A000",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:h,bold:true,color:"FFFFFF",size:18})]})] })) });
                        children.push(new Table({ width:{size:9360,type:WidthType.DXA}, columnWidths:[2000,2500,2430,2430], rows:[tokenHdrRow,...tokenRows] }));
                    } else {
                        children.push(para("This wallet holds no fungible tokens — pure XRP only.", { italics: true, color: "888888" }));
                    }

                    // AMM Pool positions
                    if (w.ammPools && w.ammPools.length > 0) {
                        children.push(spacer());
                        children.push(hdr("AMM Liquidity Pool Positions", HeadingLevel.HEADING_3 || HeadingLevel.HEADING_2));
                        children.push(para(
                            `This wallet holds ${w.ammPools.length} active liquidity pool position${w.ammPools.length>1?'s':''} on the XRPL AMM. ` +
                            `The amounts below represent this wallet's proportional share of each pool based on its LP token holdings.`
                        ));
                        const poolDataRows = w.ammPools.map((p, i) => new TableRow({
                            children: [
                                new TableCell({ borders, margins: cellMargins, width:{size:2400,type:WidthType.DXA}, shading:{fill:i%2===0?"F5EEFF":"FFFFFF",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:`${p.cur1} / ${p.cur2}`,bold:true,size:18})]})] }),
                                new TableCell({ borders, margins: cellMargins, width:{size:2000,type:WidthType.DXA}, shading:{fill:i%2===0?"F5EEFF":"FFFFFF",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:`${p.myAmt1.toFixed(4)} ${p.cur1}`,size:18})]})] }),
                                new TableCell({ borders, margins: cellMargins, width:{size:2000,type:WidthType.DXA}, shading:{fill:i%2===0?"F5EEFF":"FFFFFF",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:`${p.myAmt2.toFixed(4)} ${p.cur2}`,size:18})]})] }),
                                new TableCell({ borders, margins: cellMargins, width:{size:1530,type:WidthType.DXA}, shading:{fill:i%2===0?"F5EEFF":"FFFFFF",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:`${(p.share*100).toFixed(4)}%`,size:18})]})] }),
                                new TableCell({ borders, margins: cellMargins, width:{size:1430,type:WidthType.DXA}, shading:{fill:i%2===0?"F5EEFF":"FFFFFF",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:`$${(p.xrpVal*xrpUsd).toFixed(2)}`,size:18,color:"7B3FBE"})]})] }),
                            ]
                        }));
                        const poolHdrRow = new TableRow({ children: ["Pair","My Asset 1","My Asset 2","Pool Share","Value (USD)"].map((h,ci)=>new TableCell({ borders, margins:cellMargins, width:{size:[2400,2000,2000,1530,1430][ci],type:WidthType.DXA}, shading:{fill:"7B3FBE",type:ShadingType.CLEAR}, children:[new Paragraph({children:[new TextRun({text:h,bold:true,color:"FFFFFF",size:18})]})] })) });
                        children.push(new Table({ width:{size:9360,type:WidthType.DXA}, columnWidths:[2400,2000,2000,1530,1430], rows:[poolHdrRow,...poolDataRows] }));
                    }
                    children.push(spacer());
                    children.push(rule());
                }

                // Footer note
                children.push(para(
                    "Disclaimer: Token prices are estimated using on-chain AMM pool depths and DEX order book midpoints. " +
                    "All USD values are calculated at the snapshot rate listed above and are for informational purposes only. " +
                    "This report was generated by Corn Silo and does not constitute financial advice. " +
                    "Not your keys, not your corn. 🌽",
                    { italics: true, color: "888888", size: 18 }
                ));

                // Assemble & download
                const doc = new Document({
                    styles: {
                        default: { document: { run: { font: "Arial", size: 22 } } },
                        paragraphStyles: [
                            { id: "Heading1", name: "Heading 1", basedOn: "Normal", next: "Normal", quickFormat: true,
                              run: { size: 34, bold: true, font: "Arial", color: "8B6914" },
                              paragraph: { spacing: { before: 280, after: 160 }, outlineLevel: 0 } },
                            { id: "Heading2", name: "Heading 2", basedOn: "Normal", next: "Normal", quickFormat: true,
                              run: { size: 26, bold: true, font: "Arial", color: "2D5A8E" },
                              paragraph: { spacing: { before: 200, after: 120 }, outlineLevel: 1 } },
                            { id: "Heading3", name: "Heading 3", basedOn: "Normal", next: "Normal", quickFormat: true,
                              run: { size: 22, bold: true, font: "Arial", color: "4A7C59" },
                              paragraph: { spacing: { before: 160, after: 80 }, outlineLevel: 2 } },
                        ]
                    },
                    sections: [{
                        properties: {
                            page: {
                                size: { width: 12240, height: 15840 },
                                margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
                            }
                        },
                        children
                    }]
                });

                const buffer = await Packer.toBlob(doc);
                const url = URL.createObjectURL(buffer);
                const a = document.createElement('a');
                a.href = url;
                a.download = `CornSilo_Report_${now.toISOString().slice(0,10)}.docx`;
                a.click();
                URL.revokeObjectURL(url);
                siloTalk("Harvest report printed and ready! The accountant crow approves. 📄🌽");

            } catch(err) {
                console.error('Report error:', err);
                siloTalk("The printing press jammed! Couldn't generate the report. Check console.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-file-doc"></i> Download Report';
            }
        }
    </script>
</body>
</html>
